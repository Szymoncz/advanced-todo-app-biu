<mat-toolbar color="primary">
  @if (isMobile()) {
    <button mat-icon-button (click)="toggleSidenav()">
      <mat-icon>menu</mat-icon>
    </button>
  }
  <mat-icon>check_circle</mat-icon>
  <span style="margin-left: 8px">TodoApp</span>
  <span class="spacer"></span>
  <button mat-icon-button>
    <mat-icon>notifications</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav 
    [mode]="isMobile() ? 'over' : 'side'" 
    [opened]="!isMobile() || sidenavOpened()"
    class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link"
         (click)="isMobile() && toggleSidenav()">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/tasks" routerLinkActive="active-link"
         (click)="isMobile() && toggleSidenav()">
        <mat-icon matListItemIcon>task</mat-icon>
        <span matListItemTitle>Zadania</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
